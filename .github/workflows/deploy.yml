name: CI-CD to ACR and WebApp

on:
  push:
    branches:
      - main

env:
  ACR_NAME: sibinappacrdevnew
  WEBAPP_NAME: sibin-webapp-devnew
  IMAGE_NAME: my-node-appnew

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 📥 Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 🔐 Login to Azure Container Registry
    - name: Login to ACR
      uses: docker/login-action@v2
      with:
        registry: ${{ env.ACR_NAME }}.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 🐳 Build Docker Image
    - name: Build Docker Image
      run: |
        docker build \
          -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
          .

    # 📦 Push Docker Images to ACR
    - name: Push Docker Images
      run: |
        docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

    # 🔑 Login to Azure
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 🚀 Deploy to Azure Web App (Container)
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.WEBAPP_NAME }}
        images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest